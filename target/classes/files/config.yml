# =============================================
# McBank Plugin Configuration
# Version: 3.0
# Author: Chkaduuu
# =============================================

plugin:
  name: McBank
  version: 3.0
  author: Chkaduuu
  prefix: "&6[&eMcBank&6]&r"

# Language setting
# Available: en (English), ru (Russian)
language: "en"

# Bank upgrade settings
max-bank-level: 3

# Income distribution interval
# Format: 5m (5 minutes), 1h (1 hour), 30s (30 seconds)
bank-income-time: "5m"

# Bank settings
bank:
  max_accounts_per_player: 1
  starting_balance: 0.0
  min_deposit: 1.0
  min_withdraw: 1.0
  min_transfer: 1.0
  min_cashout: 1.0
  currency_symbol: "$"
  currency_name: "Coin"
  currency_name_plural: "Coins"

# Loan (credit) settings
loan:
  enabled: true
  interest_percent: 5
  default_loan_limit: 10000
  # Overdue penalty: days after which penalty is applied
  overdue_days: 7
  # Penalty percent of current loan amount
  overdue_penalty_percent: 10

# Account number formats
account_formats:
  - "GE87BG0000000"
  - "GE98TB0000000"

# Vault integration
vault:
  enabled: true

# EssentialsX integration
essentialsx:
  enabled: true

# CMI integration
cmi:
  enabled: true

# PlaceholderAPI integration
placeholderapi:
  enabled: true

# ATM settings
atm:
  hologram_text: "&6&lBank ATM"
  hologram_height: 1.5
  pin_required: true
  # Daily operation limit per player (0 = unlimited)
  daily_limit: 10

# PIN security settings
pin:
  # Number of wrong attempts before lock
  max_attempts: 3

# Debug mode
debug: false
